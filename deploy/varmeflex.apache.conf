# /opt/varmeflex/deploy/varmeflex.apache.conf
#
# vhost for varmeflex.dk — statisk frontend + reverse proxy til FastAPI-backend.
# KUN frontend/ er offentlig; backend/, doc/ og hemmeligheder ligger uden for
# DocumentRoot og serveres aldrig.
#
# Kræver moduler:  sudo a2enmod proxy proxy_http rewrite ssl
# Aktivér så:      sudo a2ensite varmeflex.dk && sudo systemctl reload apache2

# ---------------------------------------------------------------------------
# HTTP: redirect til HTTPS — men lad Let's Encrypt-fornyelse passere først.
# ---------------------------------------------------------------------------
<VirtualHost *:80>
  ServerName       varmeflex.dk
  ServerAlias      www.varmeflex.dk
  ServerAdmin      webmaster@varmeflex.dk
  ServerSignature  Off

  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

  ErrorLog  ${APACHE_LOG_DIR}/varmeflex.dk-80-error.log
  CustomLog ${APACHE_LOG_DIR}/varmeflex.dk-80-access.log combined
</VirtualHost>

# ---------------------------------------------------------------------------
# HTTPS: statisk frontend + /api/ proxy til backenden.
# ---------------------------------------------------------------------------
<VirtualHost *:443>
  ServerName       varmeflex.dk
  ServerAlias      www.varmeflex.dk
  ServerAdmin      webmaster@varmeflex.dk
  ServerSignature  Off

  # Kun frontend-mappen er web-roden. Alt andet i /opt/varmeflex er usynligt.
  DocumentRoot /opt/varmeflex/frontend
  <Directory /opt/varmeflex/frontend>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html
    # Tving browseren til altid at revalidere de statiske filer (billige 304'er
    # via ETag/Last-Modified). Under aktiv udvikling sikrer det at ny frontend-
    # kode altid hentes uden hard-reload. Kan ændres til en cache-TTL senere.
    Header set Cache-Control "no-cache"
  </Directory>

  # Alt under /api/ sendes til FastAPI-backenden på localhost.
  # Frontend og backend deler origin (varmeflex.dk:443), så session-cookien
  # flyder uden CORS — derfor virker gaten uden ekstra opsætning.
  ProxyPreserveHost On
  ProxyPass        /api/  http://127.0.0.1:8001/api/
  ProxyPassReverse /api/  http://127.0.0.1:8001/api/

  SSLEngine on
  Include /etc/letsencrypt/options-ssl-apache.conf
  # SAN-certifikatet under kramerjensen.dk dækker også varmeflex.dk + www.
  SSLCertificateFile    /etc/letsencrypt/live/kramerjensen.dk/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/kramerjensen.dk/privkey.pem

  ErrorLog  ${APACHE_LOG_DIR}/varmeflex.dk-443-error.log
  CustomLog ${APACHE_LOG_DIR}/varmeflex.dk-443-access.log combined
</VirtualHost>
